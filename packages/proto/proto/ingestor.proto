syntax = "proto3";
package shieldrasp.ingestor;
import "proto/event.proto";
option go_package = "github.com/shieldrasp/ingestor/pkg/proto/ingestor";

message IngestRequest {
  shieldrasp.events.TelemetryBatch batch = 1;
}

message IngestResponse {
  bool success = 1;
  int32 events_processed = 2;
  string message = 3;
}

service IngestorService {
  rpc SendTelemetry (IngestRequest) returns (IngestResponse);
}