syntax = "proto3";
package shieldrasp.events;
option go_package = "github.com/shieldrasp/ingestor/pkg/proto/events";

message AttackEvent {
  string event_id = 1;
  string agent_id = 2;
  string api_key = 3;
  int64 timestamp_ns = 4;
  string attack_type = 5;
  string attack_subtype = 6;
  float confidence_score = 7;
  string severity = 8;
  string service_name = 9;
  string environment = 10;
  string request_id = 11;
  string user_id = 12;
  string session_id = 13;
  string source_ip = 14;
  string http_method = 15;
  string http_path = 16;
  string http_query = 17;
  bytes request_body_hash = 18;
  string taint_source = 19;
  string taint_path = 20;
  string taint_sink = 21;
  string blocked_value_hash = 22;
  bool was_blocked = 23;
  string rule_id = 24;
  string cwe_id = 25;
  string owasp_category = 26;
  string language = 27;
  string framework = 28;
  string agent_version = 29;
}

message TelemetryBatch {
  repeated AttackEvent events = 1;
}