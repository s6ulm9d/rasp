[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "shieldrasp"
version = "1.0.0"
description = "ShieldRASP Runtime Application Self-Protection for Python"
readme = "README.md"
requires-python = ">=3.9"
dependencies = [
    "wrapt>=1.15.0",
    "sqlglot>=19.0.0",
    "grpcio>=1.59.0",
    "protobuf>=4.24.4",
    "zstandard>=0.21.0",
    "python-socketio[client]>=5.11.0",
    "websocket-client>=1.7.0"
]

[project.entry-points."python.sitecustomize"]
shieldrasp = "shieldrasp.loader:load"
