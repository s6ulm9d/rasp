version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: shieldrasp
      POSTGRES_PASSWORD: password
      POSTGRES_DB: shieldrasp
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U shieldrasp" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  shieldrasp-api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://shieldrasp:password@postgres:5432/shieldrasp}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - KAFKA_BROKERS=${KAFKA_BROKERS:-kafka:29092}
      - JWT_SECRET=${JWT_SECRET:-super_secret_jwt_key_for_dev_only}
    depends_on:
      postgres:
        condition: service_healthy

  shieldrasp-ingestor:
    build:
      context: .
      dockerfile: apps/ingestor/Dockerfile
    ports:
      - "50051:50051"
      - "9090:9090"
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://shieldrasp:password@postgres:5432/shieldrasp}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - KAFKA_BROKERS=${KAFKA_BROKERS:-kafka:29092}
    depends_on:
      - postgres
      - redis
      - kafka

  shieldrasp-dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
    ports:
      - "3001:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3000
      - NEXT_PUBLIC_WS_URL=http://localhost:3000

  shieldrasp-ml:
    build:
      context: .
      dockerfile: apps/ml-inference/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - KAFKA_BROKERS=kafka:29092
    depends_on:
      - kafka

volumes:
  pgdata:
